<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Bird Arcade</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <!-- Coins Indicator (Global UI layer in Lobby / Screens) -->
        <div id="top-bar">
            <div id="settings-btn" class="icon-btn">⚙️</div>
            <div id="coin-container">
                <div class="coin-icon"></div>
                <span id="coin-count">0</span>
            </div>
        </div>

        <!-- HUD (In Game) -->
        <div id="hud" class="hidden">
            <div id="score">0</div>
        </div>

        <!-- Start/Lobby Menu -->
        <div id="lobby-screen" class="screen">
            <h1 class="logo-text">FLAPPY<br><span class="accent-text">ARCADE</span></h1>
            <div id="best-score-display">BEST SCORE: <span id="best-score-val">0</span></div>
            
            <button id="start-btn" class="btn play-btn animate-pulse">PLAY</button>
            
            <div class="lobby-panels">
                <!-- Left panel: Multiplayer stub controls -->
                <div class="lobby-panel-column">
                    <div class="panel-section-title">MULTIPLAYER</div>
                    <button class="btn-sub disabled" id="create-room-btn">Create Room</button>
                    <button class="btn-sub disabled" id="join-room-btn">Join Room</button>
                    <button class="btn-sub disabled" id="friends-btn">Friends 👥</button>
                </div>
                
                <!-- Right panel: Customisation, Shop & Leaderboards -->
                <div class="lobby-panel-column">
                    <div class="panel-section-title">COLLECTION</div>
                    <button class="btn-sub" id="customize-btn">Skins 👕</button>
                    <button class="btn-sub" id="shop-btn">Shop 🛒</button>
                    <button class="btn-sub disabled" id="leaderboard-btn">Rankings 🏆</button>
                </div>
            </div>
        </div>

        <!-- Customize Screen Overlay -->
        <div id="customize-overlay" class="screen overlay-screen hidden">
            <div class="overlay-panel">
                <button class="close-btn" id="customize-close">&times;</button>
                <h2>MY BIRD SKINS</h2>
                <div class="skins-grid" id="skins-select-grid">
                    <!-- Dynamic rendering in JS -->
                </div>
            </div>
        </div>

        <!-- Shop Screen Overlay -->
        <div id="shop-overlay" class="screen overlay-screen hidden">
            <div class="overlay-panel">
                <button class="close-btn" id="shop-close">&times;</button>
                <h2>BIRD SHOP</h2>
                <div class="skins-grid" id="shop-items-grid">
                    <!-- Dynamic rendering in JS -->
                </div>
            </div>
        </div>

        <!-- Settings Screen Overlay -->
        <div id="settings-overlay" class="screen overlay-screen hidden">
            <div class="overlay-panel settings-panel">
                <button class="close-btn" id="settings-close">&times;</button>
                <h2>SETTINGS</h2>
                <div class="settings-row">
                    <span>Music 🎵</span>
                    <label class="switch">
                        <input type="checkbox" id="music-toggle" checked>
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="settings-row">
                    <span>Sound Effects 🔊</span>
                    <label class="switch">
                        <input type="checkbox" id="sound-toggle" checked>
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over-screen" class="screen hidden">
            <h1>Game Over</h1>
            <p>Score: <span id="final-score">0</span></p>
            <button id="restart-btn" class="btn">Restart</button>
            <button id="lobby-back-btn" class="btn-sub">Lobby</button>
        </div>
    </div>

    <!-- Preload Assets -->
    <div style="display: none;">
        <img id="img-bird-idle" src="assets/characters/bird_idle.png">
        <img id="img-bird-fly-1" src="assets/characters/bird_fly_1.png">
        <img id="img-bird-fly-2" src="assets/characters/bird_fly_2.png">
        <img id="img-bird-dead" src="assets/characters/bird_dead.png">
    </div>

    <script src="script.js"></script>
</body>
</html>
